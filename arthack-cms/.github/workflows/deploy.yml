name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Fetch latest data from API (fallback JSON)
        run: |
          curl -sf "${{ secrets.API_URL }}/export/static" \
            -o frontend/public/arthack-data.json \
            || echo '{"obras":[],"artigos":[],"updated_at":""}' > frontend/public/arthack-data.json
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_STATIC_FALLBACK: /ArtHack/arthack-data.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
